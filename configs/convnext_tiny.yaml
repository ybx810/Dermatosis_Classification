project:
  name: large-medical-image-whole-image-classification-convnext-tiny
  task: whole-image-classification
  output_dir: outputs

task:
  mode: whole_image

data:
  raw_dir: G:/18disease_full
  metadata_dir: data/metadata
  split_dir: data/splits
  cache_dir: data/cache
  num_classes: 18

build_image_splits:
  output_dir: data/splits
  label_mapping_path: data/splits/label_mapping.json
  summary_path: data/splits/split_summary.json
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

whole_image:
  train_csv: data/splits/train_images.csv
  val_csv: data/splits/val_images.csv
  test_csv: data/splits/test_images.csv
  image_size: 512
  interpolation: area
  pad_value: 0
  pad_position: center
  max_image_pixels:
  cache:
    enabled: true
    dir: data/cache/whole_images
    metadata_path: data/metadata/whole_image_metadata.csv
    summary_path: data/metadata/whole_image_summary.json
    format: png
    overwrite: false
    num_workers: 4
    use_cached_for_training: true
    allow_raw_fallback: false

train:
  batch_size: 16
  num_workers: 4
  epochs: 20
  device: cuda
  mixed_precision: true
  seed: 42

dataloader:
  pin_memory: true
  drop_last: false

augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.5
  normalize: imagenet

model:
  name: convnext_tiny
  pretrained: true
  dropout: 0.0

loss:
  name: cross_entropy
  gamma: 2.0
  alpha:
  reduction: mean
  use_alpha_from_class_counts: false
  use_class_weights: false

optimizer:
  name: adam
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: none
  step_size: 5
  gamma: 0.1
  eta_min: 0.0
  factor: 0.1
  patience: 2

evaluation:
  primary_metric: macro_f1
