project:
  name: large-medical-image-whole-image-classification
  task: whole-image-classification
  output_dir: outputs

task:
  mode: whole_image

data:
  raw_dir: data/raw/16disease_full
  metadata_dir: data/metadata
  split_dir: data/splits
  cache_dir: data/cache
  num_classes: 12

build_image_splits:
  output_dir: data/splits
  label_mapping_path: data/splits/label_mapping.json
  summary_path: data/splits/split_summary.json
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

whole_image:
  train_csv: data/splits/train_images.csv
  val_csv: data/splits/val_images.csv
  test_csv: data/splits/test_images.csv
  image_size: 512
  interpolation: area
  pad_value: 0
  pad_position: center
  max_image_pixels:
  cache:
    enabled: true
    dir: data/cache/whole_images
    metadata_path: data/metadata/whole_image_metadata.csv
    summary_path: data/metadata/whole_image_summary.json
    format: png
    overwrite: false
    num_workers: 4
    use_cached_for_training: true
    allow_raw_fallback: false

train:
  batch_size: 16
  num_workers: 8
  epochs: 10
  device: cuda
  mixed_precision: true
  seed: 42

dataloader:
  pin_memory: true
  drop_last: false

augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.5
  normalize: imagenet

model:
  name: efficientnet_b0
  pretrained: true
  dropout: 0.3

loss:
  name: focal
  gamma: 2.0
  alpha:
  reduction: mean
  use_alpha_from_class_counts: true
  use_class_weights: false

optimizer:
  name: adam
  lr: 0.0003
  weight_decay: 0.0001
  backbone_lr: 0.00003
  classifier_lr: 0.0003
  backbone_weight_decay:
  classifier_weight_decay:
  differential_lr: true

finetune:
  enabled: true
  freeze_backbone_epochs: 3
  unfreeze_strategy: all
  reinit_optimizer_on_unfreeze: true
  reset_scheduler_on_unfreeze: true
  train_bn_when_frozen: false

scheduler:
  name: plateau
  step_size: 5
  gamma: 0.1
  eta_min: 0.0
  factor: 0.1
  patience: 2

evaluation:
  primary_metric: macro_f1

ml_experiment:
  enabled: false
  output_dir: outputs
  feature_dir:
  feature_source: imagenet_pretrained
  checkpoint_path:
  backbone: efficientnet_b0
  extract_batch_size:
  use_mixed_precision: true
  save_features: true
  reuse_saved_features: false

  preprocessing:
    standardize: true
    pca:
      enabled: false
      n_components: 0.95

  model_selection:
    primary_metric: macro_f1

  classifiers:
    selected:
      - logistic_regression
      - linear_svm
      - rbf_svm
      - random_forest
      - knn

    logistic_regression:
      C: [0.01, 0.1, 1.0, 10.0]
      max_iter: 3000
      class_weight: balanced

    linear_svm:
      C: [0.01, 0.1, 1.0, 10.0]
      class_weight: balanced

    rbf_svm:
      C: [0.1, 1.0, 10.0]
      gamma: ["scale", 0.01, 0.001]
      class_weight: balanced
      probability: true

    random_forest:
      n_estimators: [200, 500]
      max_depth: [null, 10, 20]
      class_weight: balanced

    knn:
      n_neighbors: [3, 5, 7]
      weights: ["uniform", "distance"]
