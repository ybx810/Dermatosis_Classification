project:
  name: large-medical-image-whole-image-classification
  task: whole-image-classification
  output_dir: outputs

task:
  mode: whole_image

data:
  raw_dir: data/raw/16disease_full
  metadata_dir: data/metadata
  split_dir: data/splits
  cache_dir: data/cache
  num_classes: 11

label_merge:
  enabled: false
  partition: []
  merged_label_names: []

build_image_splits:
  mode: kfold
  output_dir: data/splits
  folds_dir: data/splits/cv3
  label_mapping_path: data/splits/label_mapping.json
  summary_path: data/splits/split_summary.json
  train_ratio: 0.8
  val_ratio: 0
  test_ratio: 0.2
  n_splits: 3
  seed: 42
  keep_fixed_test_in_kfold: true

whole_image:
  train_csv: data/splits/train_images.csv
  val_csv: data/splits/val_images.csv
  test_csv: data/splits/test_images.csv
  image_size: 512
  interpolation: area
  pad_value: 0
  pad_position: center
  max_image_pixels:
  cache:
    enabled: true
    dir: data/cache/whole_images
    metadata_path: data/metadata/whole_image_metadata.csv
    summary_path: data/metadata/whole_image_summary.json
    format: png
    overwrite: false
    num_workers: 4
    use_cached_for_training: true
    allow_raw_fallback: false

train:
  batch_size: 4
  num_workers: 4
  epochs: 20
  device: cuda
  mixed_precision: true
  seed: 42
  sampling:
    enabled: false
    strategy: none
    replacement: true
    epoch_size: auto
    log_distribution: true
  augmentation:
    random_resized_crop:
      enabled: false
      p: 0.5
      scale: [0.85, 1.0]
      ratio: [0.95, 1.05]
    rotate:
      enabled: false
      p: 0.5
      limit: 10
      border_mode: constant
      fill: 0
      crop_border: false
    horizontal_flip: 0.5
    vertical_flip: 0.5
    normalize: imagenet

dataloader:
  pin_memory: true
  drop_last: false

model:
  name: efficientnet_b0
  pretrained: true
  dropout: 0.5

loss:
  name: focal
  gamma: 2.0
  alpha:
  reduction: mean
  use_alpha_from_class_counts: true
  use_class_weights: false

optimizer:
  name: adam
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: none
  step_size:
  gamma:
  eta_min:
  factor:
  patience:

evaluation:
  primary_metric: macro_f1

search_merge:
  enabled: true

  target_num_classes: [6, 5, 4, 3]
  beam_width: 8
  top_n_final_per_target: 3

  scoring:
    metric: val_macro_f1
    choose_best_repeat: true

  cv:
    enabled: true
    n_splits: 3
    epochs: 15
    reuse_existing_folds: true
    use_fixed_test_for_search: false

  repeats:
    num_repeats: 3
    seed_mode: offset
    base_seed: 42
    seed_offsets: [0, 1, 2]

  cache:
    enabled: true
    dir: outputs/merge_search_cache

  historical_confusion:
    enabled: false
    paths: []
    input_type: auto
    normalize: true
    average_multiple: true

  medical_constraints:
    must_stay_single: []
    forbidden_pairs: []
    preferred_pairs: []

  output:
    dir: outputs/merge_search
    save_all_candidates: true
    save_repeat_details: true
